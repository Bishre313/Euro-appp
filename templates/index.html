<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision Prediction</title>
</head>
<body>
    <h1>Eurovision Prediction Form</h1>
    <form id="predictionForm">
        <label for="danceability">Danceability:</label>
        <input type="number" step="0.01" id="danceability" name="danceability" required><br><br>

        <label for="acousticness">Acousticness:</label>
        <input type="number" step="0.01" id="acousticness" name="acousticness" required><br><br>

        <label for="speechiness">Speechiness:</label>
        <input type="number" step="0.01" id="speechiness" name="speechiness" required><br><br>

        <label for="tempo">Tempo:</label>
        <input type="number" id="tempo" name="tempo" required><br><br>

        <label for="valence">Valence:</label>
        <input type="number" step="0.01" id="valence" name="valence" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <p id="result"></p>

    <script>
        document.getElementById("predictionForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const data = {
                danceability: parseFloat(document.getElementById("danceability").value),
                acousticness: parseFloat(document.getElementById("acousticness").value),
                speechiness: parseFloat(document.getElementById("speechiness").value),
                tempo: parseFloat(document.getElementById("tempo").value),
                valence: parseFloat(document.getElementById("valence").value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("result").innerText = "Predicted Points: " + result.predicted_points;
        });
    </script>
</body>
</html>
